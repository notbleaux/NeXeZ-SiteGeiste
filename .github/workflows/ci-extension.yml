name: CI - Browser Extension

on:
  push:
    branches: [develop, main]
    paths:
      - 'packages/extension/**'
      - 'packages/shared/**'
      - '.github/workflows/ci-extension.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'packages/extension/**'
      - 'packages/shared/**'

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter extension lint

      - name: Type check
        run: pnpm --filter extension typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter extension test --coverage

  build:
    name: Build Extension
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox, edge]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for ${{ matrix.browser }}
        run: pnpm --filter extension build:${{ matrix.browser }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: extension-${{ matrix.browser }}
          path: packages/extension/dist/${{ matrix.browser }}
