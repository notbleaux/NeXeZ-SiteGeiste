name: CI

on:
  push:
    branches:
      - main
      - dev
      - "claude/proposals**"
      - "kimi/proposals**"
      - "deepseek/proposals**"
      - "copilot/proposals**"
      - "copilot/**"
      - "agents/blackboard"
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate:
    name: Validate monorepo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate workspace structure (dry run)
        run: npm install --dry-run

      - name: Install dependencies
        run: npm install

      - name: Typecheck (if TypeScript files exist)
        run: |
          if find . -name "*.ts" -not -path "*/node_modules/*" | grep -q .; then
            echo "TypeScript files found — running tsc --noEmit across workspaces"
            npm run typecheck
          else
            echo "No TypeScript files found — skipping typecheck"
          fi

      - name: Real-name leakage scan
        run: |
          echo "Scanning for real-name leakage..."
          if git log --all --format="%an %ae %cn %ce" | grep -v "github-actions\|noreply\|Copilot\|notbleaux" | grep -Ei "[a-z]+ [a-z]+" | grep -v "^$"; then
            echo "ERROR: Potential real-name leakage detected in git history"
            exit 1
          fi
          echo "No real-name leakage detected."
