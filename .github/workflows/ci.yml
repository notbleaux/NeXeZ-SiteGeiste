name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Grep for real-name leakage
        run: |
          if grep -RInE '(newjeans|minji|hanni|danielle|haerin|hyein)' . \
            --exclude-dir=.git \
            --exclude-dir=node_modules; then
            echo "Potential real-name leakage detected."
            exit 1
          fi

      - name: Validate workspaces with dry-run install
        run: npm install --dry-run

      - name: Install dependencies
        run: npm install

      - name: Detect TypeScript files in workspaces
        id: ts
        run: |
          if find apps services packages -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.mts' -o -name '*.cts' \) | grep -q .; then
            echo "has_ts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_ts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Typecheck
        if: steps.ts.outputs.has_ts == 'true'
        run: npx tsc --noEmit
