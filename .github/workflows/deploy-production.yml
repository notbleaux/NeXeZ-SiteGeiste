name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy-webapp:
    name: Deploy WebApp to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter webapp build
        env:
          NODE_ENV: production

      - name: Deploy to production
        run: ./scripts/deploy/deploy-production.sh webapp
        env:
          DEPLOY_TOKEN: ${{ secrets.PRODUCTION_DEPLOY_TOKEN }}

  deploy-backend:
    name: Deploy Backend to Production
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-webapp]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker images
        run: |
          docker build -f infrastructure/docker/backend.Dockerfile -t ${{ steps.login-ecr.outputs.registry }}/nexez-backend:${{ github.sha }} .
          docker push ${{ steps.login-ecr.outputs.registry }}/nexez-backend:${{ github.sha }}

      - name: Deploy to ECS
        run: ./scripts/deploy/deploy-production.sh backend
        env:
          CLUSTER_NAME: nexez-production
          IMAGE_TAG: ${{ github.sha }}
